name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            compiler: dmd-latest
          - os: ubuntu-latest
            arch: amd64
            compiler: ldc-master
          - os: ubuntu-24.04-arm
            arch: arm64
            compiler: ldc-master
          - os: macos-latest
            arch: arm64
            compiler: ldc-master
          - os: windows-latest
            arch: amd64
            compiler: dmd-latest
          - os: windows-latest
            arch: amd64
            compiler: ldc-master
      fail-fast: false
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@main
      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: latest
          ninjaVersion: latest
      - uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{matrix.compiler}}
      - name: Testing
        run: dub test
      - name: Build examples
        working-directory: examples
        run: |
          dub build :simple
          dub build :tokenize
          dub build :multimodal

